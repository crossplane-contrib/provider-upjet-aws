apiVersion: cloudwatchlogs.aws.upbound.io/v1beta1
kind: AccountPolicy
metadata:
  annotations:
    meta.upbound.io/example-id: cloudwatchlogs/v1beta1/accountpolicy
  labels:
    testing.upbound.io/example-name: data-protection
  name: data-protection
  namespace: upbound-system
spec:
  forProvider:
    region: us-west-1
    policyType: DATA_PROTECTION_POLICY
    policyDocument: |
      {
        "Name": "DataProtection",
        "Version": "2021-06-01",
        "Statement": [
          {
            "Sid": "Audit",
            "DataIdentifier": ["arn:aws:dataprotection::aws:data-identifier/EmailAddress"],
            "Operation": {
              "Audit": {
                "FindingsDestination": {}
              }
            }
          },
          {
            "Sid": "Redact",
            "DataIdentifier": ["arn:aws:dataprotection::aws:data-identifier/EmailAddress"],
            "Operation": {
              "Deidentify": {
                "MaskConfig": {}
              }
            }
          }
        ]
      }


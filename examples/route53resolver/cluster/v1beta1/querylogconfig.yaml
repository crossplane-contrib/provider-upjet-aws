apiVersion: route53resolver.aws.upbound.io/v1beta1
kind: QueryLogConfig
metadata:
  annotations:
    meta.upbound.io/example-id: route53resolver/v1beta1/querylogconfig
  labels:
    testing.upbound.io/example-name: example-querylogconfig
  name: example-querylogconfig
spec:
  forProvider:
    destinationArn: arn:aws:logs:us-west-1:${data.aws_account_id}:log-group:example-querylogconfig-group
    name: example-querylogconfig
    region: us-west-1
    tags:
      Environment: test
---
apiVersion: cloudwatchlogs.aws.upbound.io/v1beta1
kind: Group
metadata:
  annotations:
    meta.upbound.io/example-id: route53resolver/v1beta1/querylogconfig
  labels:
    testing.upbound.io/example-name: example-querylogconfig
  name: example-querylogconfig-group
spec:
  forProvider:
    region: us-west-1
    skipDestroy: false
    deletionProtectionEnabled: false
    retentionInDays: 1
    tags:
      Name: QueryLogConfig
apiVersion: memorydb.aws.upbound.io/v1beta1
kind: MultiRegionCluster
metadata:
  annotations:
    meta.upbound.io/example-id: memorydb/v1beta1/multiregioncluster
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    description: example multi-region cluster
    engine: valkey
    multiRegionClusterNameSuffix: example
    nodeType: db.r7g.xlarge
    region: us-west-1
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPCIPv6CidrBlockAssociation
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation-ipam
  labels:
    testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
  name: example-ipam
  namespace: upbound-system
spec:
  forProvider:
    ipv6IpamPoolIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
    ipv6NetmaskLength: 56
    region: us-east-2
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPC
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation-ipam
  labels:
    testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
  name: example-ipam-vpc
  namespace: upbound-system
spec:
  forProvider:
    cidrBlock: 10.0.0.0/16
    region: us-east-2
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPCIpamPool
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation-ipam
  labels:
    testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
  name: example-ipam-pool
  namespace: upbound-system
spec:
  forProvider:
    addressFamily: ipv6
    ipamScopeIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
    locale: us-east-2
    region: us-east-2
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPCIpamPoolCidr
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation-ipam
  labels:
    testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
  name: example-ipam-pool-cidr
  namespace: upbound-system
spec:
  forProvider:
    netmaskLength: 52
    ipamPoolIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
    region: us-east-2
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPCIpamScope
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation-ipam
  labels:
    testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
  name: example-ipam-scope
  namespace: upbound-system
spec:
  forProvider:
    ipamIdSelector:
      matchLabels:
        testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
    region: us-east-2
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPCIpam
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation-ipam
  labels:
    testing.upbound.io/example-name: vpcipv6cidrblockassociation-ipam
  name: example-ipam
  namespace: upbound-system
spec:
  forProvider:
    enablePrivateGua: true
    operatingRegions:
    - regionName: us-east-2
    region: us-east-2

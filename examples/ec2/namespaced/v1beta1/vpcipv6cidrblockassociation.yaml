apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPCIPv6CidrBlockAssociation
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    assignGeneratedIpv6CidrBlock: true
    region: us-west-1
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
---
apiVersion: ec2.aws.m.upbound.io/v1beta1
kind: VPC
metadata:
  annotations:
    meta.upbound.io/example-id: ec2/v1beta1/vpcipv6cidrblockassociation
  labels:
    testing.upbound.io/example-name: example
  name: example-vpc
  namespace: upbound-system
spec:
  forProvider:
    cidrBlock: 10.0.0.0/16
    region: us-west-1
apiVersion: codebuild.aws.m.upbound.io/v1beta1
kind: SourceCredential
metadata:
  name: example
  namespace: upbound-system
  annotations:
    meta.upbound.io/example-id: codebuild/v1beta1/sourcecredential
  labels:
    testing.upbound.io/example-name: example-codebuild-sourcecredential
spec:
  forProvider:
    region: us-west-1
    authType: PERSONAL_ACCESS_TOKEN
    serverType: GITHUB
    tokenSecretRef:
      key: token
      name: example-token
---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    meta.upbound.io/example-id: codebuild/v1beta1/sourcecredential
  labels:
    testing.upbound.io/example-name: example-codebuild-sourcecredential
  name: example-token
  namespace: upbound-system
stringData:
  token: "yourtokenvalue"
---

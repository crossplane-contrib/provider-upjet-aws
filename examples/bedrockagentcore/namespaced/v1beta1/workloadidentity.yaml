# Basic Workload Identity Example
# Creates a Bedrock AgentCore Workload Identity with a single allowed OAuth2 return URL.

apiVersion: bedrockagentcore.aws.m.upbound.io/v1beta1
kind: WorkloadIdentity
metadata:
  annotations:
    meta.upbound.io/example-id: bedrockagentcore/v1beta1/workloadidentity
  labels:
    testing.upbound.io/example-name: workloadidentity
  name: example-workload-identity
  namespace: upbound-system
spec:
  forProvider:
    region: us-west-2
    allowedResourceOauth2ReturnUrls:
    - "https://example.com/callback"

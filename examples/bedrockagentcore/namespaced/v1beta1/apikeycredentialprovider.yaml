# Basic API Key Credential Provider Example
# This example creates an API key credential provider for agent runtime authentication.

apiVersion: bedrockagentcore.aws.m.upbound.io/v1beta1
kind: APIKeyCredentialProvider
metadata:
  annotations:
    meta.upbound.io/example-id: bedrockagentcore/v1beta1/apikeycredentialprovider
  labels:
    testing.upbound.io/example-name: apikeycredentialprovider
  name: apikeycredentialprovider
  namespace: upbound-system
spec:
  forProvider:
    region: us-west-2
    apiKeySecretRef:
      key: api-key
      name: example-api-key-secret
    tags:
      Environment: production
---
apiVersion: v1
kind: Secret
metadata:
  name: example-api-key-secret
  namespace: upbound-system
stringData:
  api-key: "T0ps3cr3t!"
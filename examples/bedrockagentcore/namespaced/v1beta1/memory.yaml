# Basic Memory Example
# Creates a Bedrock AgentCore Memory for persistent agent interaction storage.

apiVersion: bedrockagentcore.aws.m.upbound.io/v1beta1
kind: Memory
metadata:
  annotations:
    meta.upbound.io/example-id: bedrockagentcore/v1beta1/memory
  labels:
    testing.upbound.io/example-name: memory
  name: memory
  namespace: upbound-system
spec:
  forProvider:
    region: us-west-2
    name: example_memory
    description: Memory for agent interactions
    eventExpiryDuration: 30
    tags:
      Environment: production

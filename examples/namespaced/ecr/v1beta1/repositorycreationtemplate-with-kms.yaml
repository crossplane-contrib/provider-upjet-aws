apiVersion: ecr.aws.m.upbound.io/v1beta1
kind: RepositoryCreationTemplate
metadata:
  annotations:
    meta.upbound.io/example-id: ecr/v1beta1/repositorycreationtemplate-with-kms
  name: rct-encrypted
  namespace: upbound-system
spec:
  forProvider:
    region: us-east-1
    prefix: "ENCRYPTED"
    appliedFor:
      - PULL_THROUGH_CACHE
      - REPLICATION
    imageTagMutability: MUTABLE
    encryptionConfiguration:
      - encryptionType: KMS
        kmsKeyRef:
          name: sample-key
    resourceTags:
      Environment: "production"
      Encryption: "enabled"



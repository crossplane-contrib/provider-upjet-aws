apiVersion: timestreaminfluxdb.aws.m.upbound.io/v1beta1
kind: DBCluster
metadata:
  annotations:
    meta.upbound.io/example-id: timestreaminfluxdb/v1beta1/dbcluster
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    allocatedStorage: 20
    bucket: example-bucket-name
    dbInstanceType: db.influx.medium
    failoverMode: AUTOMATIC
    name: example-db-cluster
    organization: organization
    passwordSecretRef:
      key: password
      name: influxdb-password
      namespace: upbound-system
    port: 8086
    region: us-west-1
    username: admin
    vpcSecurityGroupIdsRefs:
    - name: example
    vpcSubnetIdsRefs:
    - name: example-1
    - name: example-2
  providerConfigRef:
    kind: ClusterProviderConfig
    name: default

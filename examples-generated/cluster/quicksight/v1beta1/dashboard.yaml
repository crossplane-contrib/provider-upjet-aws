apiVersion: quicksight.aws.upbound.io/v1beta1
kind: Dashboard
metadata:
  annotations:
    meta.upbound.io/example-id: quicksight/v1beta1/dashboard
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    dashboardId: example-id
    name: example-name
    region: us-west-1
    sourceEntity:
      sourceTemplate:
        arn: ${aws_quicksight_template.source.arn}
        dataSetReferences:
        - dataSetArnSelector:
            matchLabels:
              testing.upbound.io/example-name: dataset
          dataSetPlaceholder: "1"
    versionDescription: version

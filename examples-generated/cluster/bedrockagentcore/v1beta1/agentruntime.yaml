apiVersion: bedrockagentcore.aws.upbound.io/v1beta1
kind: AgentRuntime
metadata:
  annotations:
    meta.upbound.io/example-id: bedrockagentcore/v1beta1/agentruntime
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    agentRuntimeArtifact:
      containerConfiguration:
        containerUri: ${aws_ecr_repository.example.repository_url}:latest
    agentRuntimeName: example_agent_runtime
    networkConfiguration:
      networkMode: PUBLIC
    region: us-west-1
    roleArnSelector:
      matchLabels:
        testing.upbound.io/example-name: example

---

apiVersion: iam.aws.upbound.io/v1beta1
kind: Role
metadata:
  annotations:
    meta.upbound.io/example-id: bedrockagentcore/v1beta1/agentruntime
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    assumeRolePolicy: ${data.aws_iam_policy_document.assume_role.json}
    region: us-west-1

---

apiVersion: iam.aws.upbound.io/v1beta1
kind: RolePolicy
metadata:
  annotations:
    meta.upbound.io/example-id: bedrockagentcore/v1beta1/agentruntime
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    policy: ${data.aws_iam_policy_document.ecr_permissions.json}
    region: us-west-1
    roleSelector:
      matchLabels:
        testing.upbound.io/example-name: example

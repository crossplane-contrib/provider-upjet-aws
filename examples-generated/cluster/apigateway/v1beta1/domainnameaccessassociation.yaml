apiVersion: apigateway.aws.upbound.io/v1beta1
kind: DomainNameAccessAssociation
metadata:
  annotations:
    meta.upbound.io/example-id: apigateway/v1beta1/domainnameaccessassociation
  labels:
    testing.upbound.io/example-name: example
  name: example
spec:
  forProvider:
    accessAssociationSourceSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    accessAssociationSourceType: VPCE
    domainNameArnSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    region: us-west-1

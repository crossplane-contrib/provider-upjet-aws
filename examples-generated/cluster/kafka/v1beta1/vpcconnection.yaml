apiVersion: kafka.aws.upbound.io/v1beta1
kind: VPCConnection
metadata:
  annotations:
    meta.upbound.io/example-id: kafka/v1beta1/vpcconnection
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    authentication: SASL_IAM
    clientSubnetsSelector:
      matchLabels:
        testing.upbound.io/example-name: test[*]
    region: us-west-1
    securityGroupsRefs:
    - name: test
    targetClusterArnSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    vpcIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test

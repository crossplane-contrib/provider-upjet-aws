apiVersion: bedrockagentcore.aws.m.upbound.io/v1beta1
kind: APIKeyCredentialProvider
metadata:
  annotations:
    meta.upbound.io/example-id: bedrockagentcore/v1beta1/apikeycredentialprovider
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    apiKeySecretRef:
      key: example-key
      name: example-secret
    region: us-west-1

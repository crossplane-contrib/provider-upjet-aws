apiVersion: quicksight.aws.m.upbound.io/v1beta1
kind: DataSet
metadata:
  annotations:
    meta.upbound.io/example-id: quicksight/v1beta1/dataset
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    dataSetId: example-id
    importMode: SPICE
    name: example-name
    physicalTableMap:
    - physicalTableMapId: example-id
      s3Source:
        dataSourceArnSelector:
          matchLabels:
            testing.upbound.io/example-name: example
        inputColumns:
        - name: Column1
          type: STRING
        uploadSettings:
          format: JSON
    region: us-west-1

apiVersion: quicksight.aws.m.upbound.io/v1beta1
kind: Analysis
metadata:
  annotations:
    meta.upbound.io/example-id: quicksight/v1beta1/analysis
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    analysisId: example-id
    name: example-name
    region: us-west-1
    sourceEntity:
      sourceTemplate:
        arn: ${aws_quicksight_template.source.arn}
        dataSetReferences:
        - dataSetArnSelector:
            matchLabels:
              testing.upbound.io/example-name: dataset
          dataSetPlaceholder: "1"

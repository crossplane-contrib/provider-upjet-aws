apiVersion: timestreaminfluxdb.aws.m.upbound.io/v1beta1
kind: DBCluster
metadata:
  annotations:
    meta.upbound.io/example-id: timestreaminfluxdb/v1beta1/dbcluster
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    allocatedStorage: 20
    bucket: example-bucket-name
    dbInstanceType: db.influx.medium
    failoverMode: AUTOMATIC
    name: example-db-cluster
    organization: organization
    passwordSecretRef:
      key: example-key
      name: example-secret
    port: 8086
    region: us-west-1
    username: admin
    vpcSecurityGroupIdsRefs:
    - name: example
    vpcSubnetIdsRefs:
    - name: example_1
    - name: example_2
